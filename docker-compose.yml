services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stadiumai
      POSTGRES_USER: stadiumai
      POSTGRES_PASSWORD: ${DB_PASSWORD:-stadiumai_pass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stadiumai"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      PROJECT_NAME: StadiumAI
      VERSION: "0.1.0"
      DATABASE_URL: postgresql://stadiumai:${DB_PASSWORD:-stadiumai_pass}@db:5432/stadiumai
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      REDIS_URL: redis://redis:6379
      BACKEND_CORS_ORIGINS: ${CORS_ORIGINS:-'["http://localhost:3000"]'}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  migrations:
    build: ./backend
    entrypoint: >
      sh -c "alembic upgrade head && echo 'Migrations complete'"
    environment:
      DATABASE_URL: postgresql://stadiumai:${DB_PASSWORD:-stadiumai_pass}@db:5432/stadiumai
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8000/api/v1}
        NEXT_PUBLIC_WS_URL: ${PUBLIC_WS_URL:-ws://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
